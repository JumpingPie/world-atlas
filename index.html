<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>world-atlas</title>
    <meta
      name="description"
      content="Interactive research atlas: country profiles, multilateral relations, conflicts, alliances, and trade."
    />
    <!--
      Empty data-URL favicon. Stops browsers from requesting
      /favicon.ico (which doesn't exist and would 404 in the server
      log on every page load). Replace with a real .ico/.svg if a
      branded favicon is wanted later.
    -->
    <link rel="icon" href="data:," />

    <link rel="stylesheet" href="styles/main.css" />
    <!--
      Theme stylesheets. Each defines its tokens scoped under a
      .theme-* class on <html>; only the active theme's class is
      present at any time, so others are inert until applied.
      Adding a new theme: add another <link> here, then list it in
      AVAILABLE_THEMES in src/core/theme.js.
    -->
    <link rel="stylesheet" href="styles/themes/atlas.css" />

    <!--
      Importmap — lets ES modules import dependencies by bare specifier
      (e.g. `import * as d3 from "d3"`) without a build step.
      Supported in all current evergreen browsers.

      MUST appear BEFORE any <script type="module"> in the document.
      The browser begins resolving a module's imports the moment it
      encounters the script tag, so a module declared earlier in the
      page won't see this map and its bare imports will fail to
      resolve. Symptom of getting this wrong: a silent module-load
      error and a frozen UI showing whatever loading placeholder is
      in the markup.

      Note: the world-atlas TopoJSON dataset is loaded by a fetch()
      call inside src/core/map.js, not via import, so it doesn't
      appear here.
    -->
    <script type="importmap">
      {
        "imports": {
          "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm",
          "topojson-client": "https://cdn.jsdelivr.net/npm/topojson-client@3/+esm"
        }
      }
    </script>

    <!--
      Apply the saved theme before <body> is parsed so the user
      doesn't see a flash of the default theme on first paint. This
      is the only place theme.js is invoked imperatively from inline
      script; everything else uses the module's exports.
    -->
    <script type="module">
      import { applyTheme, getTheme } from "./src/core/theme.js";
      applyTheme(getTheme());
    </script>
  </head>
  <body>
    <!--
      App shell — single-row layout, no header.

      Structure:
        #app (column flex)
          .app-body (row flex, fills viewport)
            #left-panel  (collapsed: width 0; expanded: ~300px)
            #map-container (flex:1, takes remaining space)
              .map-controls (top-left zoom +/-)
              .map-theme-toggle (top-right theme cycle button)
              .map-layer-handle (left-edge handle that toggles #left-panel)
              #bottom-panel (selection-gated drawer overlay)
            #country-panel (collapsed: width 0; expanded: ~380px)

      Each side panel collapses to zero in its primary axis when
      closed and expands to its declared size when .is-open is
      applied. The map container is a flex sibling so it auto-
      resizes when panels toggle — no JS layout math needed. A
      ResizeObserver in map.js re-fits the projection so the world
      geometry uses the newly available space rather than being
      letterboxed by the SVG's preserveAspectRatio.

      The right panel opens automatically when the user selects a
      country or region (via panel.js subscribing to state). The
      left panel is manual via the .map-layer-handle on the map's
      left edge. The bottom panel is selection-gated and toggled
      by its own handle. The theme toggle floats in the map's top-
      right corner so it tracks the map's right edge as the right
      panel opens.
    -->
    <div id="app">
      <div class="app-body">
        <!--
          Left panel: layer toggles, filters, search. Stub for
          Section 5; populated in Section 7 when the layer system
          gets real toggles.
        -->
        <aside
          id="left-panel"
          class="side-panel left-panel"
          aria-label="Layers and controls"
        >
          <header class="panel-header">
            <h2 class="panel-title">Layers</h2>
            <button class="panel-close" data-target="left-panel" aria-label="Close panel">&times;</button>
          </header>
          <div class="panel-cards">
            <section class="panel-card">
              <p class="panel-stub">
                Layer toggles (NATO, EU, BRICS, conflicts, trade, etc.)
                will appear here in a later section.
              </p>
            </section>
          </div>
        </aside>

        <main id="map-container">
          <!--
            Map initializes into this container. A loading message is
            shown until the TopoJSON resolves, then replaced by the SVG.
          -->
          <div class="map-loading">Loading world map…</div>

          <!--
            Paper effects overlay. Hidden by default; activated by the
            atlas theme. aria-hidden because it's purely decorative.
          -->
          <div class="paper-effects" aria-hidden="true"></div>

          <!--
            Title cartouche stack. The cartouche itself houses the
            project title and current-events headlines in alternation
            (see src/core/title-news.js); clicking the cartouche
            opens a dropdown below it listing the day's recent
            headlines in full, each clickable through to its source.

            Hardcoded warm-brown ink + cream parchment so the
            cartouche keeps the same Renaissance-map character
            regardless of which theme is active beneath it.

            The stack wrapper is pointer-events:none so map drag/
            zoom interactions still work everywhere the cartouche
            doesn't visibly occupy. The painted areas of the SVG and
            the dropdown panel re-enable pointer-events for their
            actual click targets.
          -->
          <div class="map-cartouche-stack">
            <svg
              class="map-cartouche"
              viewBox="0 0 800 70"
              preserveAspectRatio="xMidYMid meet"
              role="button"
              tabindex="0"
              aria-label="World Atlas — click for current news"
              aria-haspopup="true"
              aria-expanded="false"
              xmlns="http://www.w3.org/2000/svg"
            >
              <title>World Atlas — click for current news</title>
              <rect x="60" y="14" width="680" height="42" fill="#f2eadc" stroke="#3d2f20" stroke-width="1.2"/>
              <line x1="70" y1="20" x2="730" y2="20" stroke="#3d2f20" stroke-width="0.7" stroke-linecap="round" stroke-dasharray="0.6 3" opacity="0.65"/>
              <line x1="70" y1="50" x2="730" y2="50" stroke="#3d2f20" stroke-width="0.7" stroke-linecap="round" stroke-dasharray="0.6 3" opacity="0.65"/>
              <text x="400" y="42" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="500" fill="#3d2f20" letter-spacing="4">WORLD ATLAS</text>
            </svg>
            <div
              class="map-cartouche-dropdown"
              role="region"
              aria-label="Current news"
              hidden
            >
              <header class="cartouche-dropdown-header">Current News</header>
              <ul class="cartouche-headline-list"></ul>
              <footer class="cartouche-dropdown-footer">
                Headlines from
                <a
                  href="https://en.wikipedia.org/wiki/Portal:Current_events"
                  target="_blank"
                  rel="noopener noreferrer"
                >Wikipedia&rsquo;s Current Events portal</a>.
              </footer>
            </div>
          </div>

          <!--
            Left-panel edge handle. Always visible on the map's left
            edge; click toggles #left-panel. Lives inside
            #map-container so it tracks the map's left edge as the
            panel opens/closes. data-target hooks into the same toggle
            handler as the panel-close button below.

            The arrow points right (▶) when closed and rotates to
            point left (◀) when the panel is open (via the
            .is-active class added by the click handler).
          -->
          <button
            class="map-layer-handle"
            data-target="left-panel"
            type="button"
            aria-label="Toggle layers panel"
          >
            <span class="map-layer-handle-arrow" aria-hidden="true">&#9654;</span>
            <span class="map-layer-handle-label">Layers</span>
          </button>

          <!--
            IGO sigil popover. A single floating panel inside
            #map-container that opens when the user clicks one of the
            sigils drawn into the map at world-view zoom. Positioned
            by src/core/igo-sigils.js at click time; its content is
            populated by reusing renderInfoCard from layer-controls.
          -->
          <div class="map-igo-popover" hidden></div>

          <!--
            Theme toggle. Floats in the top-right corner of the map
            area. Label set at startup (and updated on click) to show
            the *next* theme — reads as a verb ("Atlas" = "switch to
            atlas") rather than as a current-state indicator. Tracks
            the map's right edge so it stays visible as the right
            (selection) panel opens.
          -->
          <button class="map-theme-toggle" id="theme-toggle" type="button">
            Theme
          </button>

          <!--
            Bottom panel: timeline drawer.

            Lives INSIDE map-container as an absolute-positioned
            overlay so opening/closing it doesn't reflow the layout
            (the map keeps its size; the panel slides over the
            bottom of the map area).

            Three states, controlled by classes:
              - default (no selection): translateY(100%) — fully
                hidden, no affordance.
              - .is-available (selection active): translateY shifts
                up by 32px so the handle peeks above the bottom edge.
              - .is-available.is-open: translateY(0) — full panel
                visible, overlaying the bottom of the map area.

            Click the handle to toggle between the second and third
            states. No drag — the panel only has two meaningful
            states, so dragging would be a wasted affordance.
          -->
          <div id="bottom-panel" class="bottom-panel" aria-label="Timeline">
            <button class="bottom-panel-handle" type="button" aria-label="Toggle timeline">
              <span class="bottom-panel-arrow" aria-hidden="true">&#9650;</span>
              <span class="bottom-panel-label">Timeline</span>
            </button>
            <div class="bottom-panel-content">
              <p class="panel-stub">
                Select a country to see its timeline.
              </p>
            </div>
          </div>
        </main>

        <!--
          Right panel: selection details (country / region). Auto-
          opens when state.js publishes a non-null selection; closes
          when selection clears.
        -->
        <aside
          id="country-panel"
          class="side-panel right-panel"
          aria-label="Selection details"
        ></aside>
      </div>
    </div>

    <!--
      Bootstrap script. Kept minimal — its only job is to initialize the
      map and wire up cross-cutting subsystems (state, panel, AI ping).
      All domain logic lives in modules under src/.
    -->
    <script type="module">
      import { initMap } from "./src/core/map.js";
      import { initPanel } from "./src/core/panel.js";
      import { cycleTheme, getTheme, listThemes } from "./src/core/theme.js";
      import { on, getCurrentSelection } from "./src/core/state.js";
      import { initLayerManager } from "./src/core/layer-manager.js";
      import { initLayerControls } from "./src/core/layer-controls.js";
      import { initBottomPanel } from "./src/core/bottom-panel.js";
      import { initTitleNews } from "./src/core/title-news.js";
      import { initIgoSigils } from "./src/core/igo-sigils.js";

      const container = document.getElementById("map-container");
      const panelContainer = document.getElementById("country-panel");

      // Theme toggle button. Cycles through AVAILABLE_THEMES.
      // Capitalize the displayed label since it appears as the button
      // text and the underlying theme names are lowercase identifiers.
      const themeBtn = document.getElementById("theme-toggle");
      const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
      function nextThemeLabel() {
        const themes = listThemes();
        const cur = getTheme();
        const next = themes[(themes.indexOf(cur) + 1) % themes.length];
        return cap(next);
      }
      themeBtn.textContent = nextThemeLabel();
      themeBtn.addEventListener("click", () => {
        cycleTheme();
        themeBtn.textContent = nextThemeLabel();
      });

      // Panel toggles. Any element with data-target points at a panel
      // by ID — clicking flips the panel's .is-open class. The left-
      // edge map handle (.map-layer-handle) and each panel's own
      // close button (.panel-close) both ride this same mechanism, so
      // adding more panel-toggle UI later means just adding data-
      // target somewhere; no new wiring.
      //
      // The .is-active mirroring updates only the *opener* (the map
      // handle), not the close button — close buttons hide with the
      // panel itself, so an active state on them is meaningless.
      document.querySelectorAll("[data-target]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const targetId = btn.dataset.target;
          const panel = document.getElementById(targetId);
          if (!panel) return;
          const opening = !panel.classList.contains("is-open");
          panel.classList.toggle("is-open", opening);
          document
            .querySelectorAll(
              `.map-layer-handle[data-target="${targetId}"]`
            )
            .forEach((b) => b.classList.toggle("is-active", opening));
        });
      });

      // Bottom panel — selection-gated drawer with handle.
      //
      // Two state classes:
      //   - .is-available: a country or region is selected; the
      //     handle peeks above the bottom edge as an affordance.
      //   - .is-open (only meaningful while .is-available): the
      //     panel is fully expanded and shows its content.
      //
      // The drawer has only two meaningful sizes (handle peek vs
      // full open), so a click toggle is the only interaction —
      // drag-to-resize was tried and removed because there's no
      // intermediate position worth dragging to.
      const bottomPanel = document.getElementById("bottom-panel");
      const bottomHandle = bottomPanel.querySelector(".bottom-panel-handle");

      function syncBottomPanelAvailability() {
        const hasSelection = !!getCurrentSelection();
        bottomPanel.classList.toggle("is-available", hasSelection);
        if (!hasSelection) bottomPanel.classList.remove("is-open");
      }
      on("selectedCountry", syncBottomPanelAvailability);
      on("selectedRegion", syncBottomPanelAvailability);

      bottomHandle.addEventListener("click", () => {
        bottomPanel.classList.toggle("is-open");
      });

      // Keyboard navigation through the timeline. ArrowUp / ArrowDown
      // step backward/forward through eras, but only when the bottom
      // panel is open and a country is selected — otherwise arrows
      // behave normally (e.g. scrolling the page).
      window.addEventListener("keydown", (event) => {
        if (!bottomPanel.classList.contains("is-open")) return;
        if (event.key !== "ArrowUp" && event.key !== "ArrowDown") return;
        // Don't hijack arrows while the user is in a text input.
        const target = event.target;
        const tag = target?.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA" || target?.isContentEditable) {
          return;
        }
        const direction = event.key === "ArrowUp" ? -1 : 1;
        // bubbles:true lets the event reach the document listener
        // inside timeline.js, which doesn't know about the bottom
        // panel element specifically.
        const evt = new CustomEvent("timeline-step", {
          detail: { direction },
          bubbles: true,
        });
        bottomPanel.dispatchEvent(evt);
        event.preventDefault();
      });

      // Panel can be initialized synchronously; it just listens for
      // state changes. The map initializes async because it has to
      // fetch the world TopoJSON before rendering.
      initPanel(panelContainer);

      // Title cartouche cycler — fades the inner text element of
      // .map-cartouche between "WORLD ATLAS" and current-events
      // headlines from the Wikipedia portal. Fire-and-forget: the
      // cartouche stays on the static title if events can't be
      // loaded.
      initTitleNews(document.querySelector(".map-cartouche"));

      try {
        // initMap returns the map handle other modules will use later
        // (layers, etc.). The panel doesn't need it directly — the
        // panel and map communicate through state.js, not by passing
        // handles around.
        const mapHandle = await initMap(container);

        // Expose on window strictly as a debug aid — production modules
        // import the handle from where it's stored, not via the global.
        // Removed in a later section once we have a proper app shell.
        window.__atlas = { mapHandle };

        // Layer system wire-up. The manager subscribes to
        // state.activeLayers and renders layers as they're toggled
        // on; the controls populate the left panel with toggle UI
        // for every layer in src/layers/index.js.
        initLayerManager(mapHandle);
        initLayerControls(
          document.querySelector("#left-panel .panel-cards")
        );

        // Bottom panel content manager — renders the timeline (or
        // an appropriate placeholder) in the bottom drawer based on
        // the current selection. The drawer's open/closed state is
        // managed by the handle elsewhere in this script; this is
        // strictly about what's *inside* it.
        initBottomPanel(
          document.querySelector("#bottom-panel .bottom-panel-content")
        );

        // IGO sigils — hand-curated medallions on the world-view
        // map for the major intergovernmental organizations.
        // Fire-and-forget: silently does nothing if the org JSONs
        // can't load.
        initIgoSigils(
          mapHandle,
          container.querySelector(".map-igo-popover")
        );

        // Loading message removal happens after init resolves so users
        // don't see an empty map flash before the geometry paints.
        container.querySelector(".map-loading")?.remove();
      } catch (err) {
        console.error("[atlas] map init failed:", err);
        const loading = container.querySelector(".map-loading");
        if (loading) {
          loading.className = "map-error";
          loading.textContent =
            "Failed to load world map. Check the console for details.";
        }
      }
    </script>
  </body>
</html>
